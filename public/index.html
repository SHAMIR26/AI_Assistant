<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Platform AI Assistant</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section class="chat-panel" aria-label="Platform AI chat">
      <header class="chat-header">
        <div>
          <h1>REDULIX AI Personal Assistant</h1>
        </div>

        <div class="status-stack">
          <div class="model-status" aria-label="Model status">
            <span class="status-dot" aria-hidden="true"></span>
          </div>

          <button id="rag-refresh" class="rag-refresh" type="button" aria-label="Refresh knowledge base">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 11a8 8 0 0 0-14.9-4M4 5v5h5M4 13a8 8 0 0 0 14.9 4M20 19v-5h-5" />
            </svg>
            <span id="rag-status">Loading knowledge...</span>
          </button>
        </div>
      </header>

      <section class="setup-panel" aria-label="Institute setup">
        <details id="setup-details" open>
          <summary>
            <span>Platform setup</span>
            <small id="platform-status">Not configured</small>
          </summary>

          <form id="platform-form" class="platform-form">
            <div class="form-grid">
              <label>
                Institute name
                <input id="institute-name" name="instituteName" type="text" placeholder="Example Institute" required />
              </label>

              <label>
                Platform URL
                <input id="platform-url" name="platformUrl" type="url" placeholder="https://example.edu" required />
              </label>

              <label>
                Owner email
                <input id="owner-email" name="ownerEmail" type="email" placeholder="owner@example.edu" required />
              </label>

              <label>
                Setup contact
                <input id="contact-name" name="contactName" type="text" placeholder="Your name or team" />
              </label>

              <label>
                Organization type
                <input id="organization-type" name="organizationType" type="text" placeholder="School,Company,Government,Startup..." />
              </label>
            </div>

            <label>
              Platform summary
              <textarea id="platform-summary-input" name="platformSummary" rows="3" placeholder="Describe what the platform is for." required></textarea>
            </label>

            <fieldset class="permission-list">
              <legend>Required permissions</legend>
              <label><input type="checkbox" name="ownerApproval" required /> Platform owner approved this setup</label>
              <label><input type="checkbox" name="storePlatformInfo" required /> Collect and Store platform and user information for personalization</label>
            </fieldset>

            <label class="terms-check">
              <input type="checkbox" name="termsAccepted" required />
              I agree to the REDULIX all service terms and conditions and confirm setup authority.
            </label>

            <div class="setup-actions">
              <button type="submit">Save setup</button>
            </div>

            <section id="integration-card" class="integration-card" hidden aria-live="polite">
              <div class="integration-heading">
                <div>
                  <span>Website integration code</span>
                  <small>Paste this before the closing body tag on the client's website.</small>
                </div>
                <button id="copy-integration-code" type="button">Copy code</button>
              </div>
              <textarea id="integration-code-output" readonly rows="3" spellcheck="false"></textarea>
              <p id="integration-copy-status" class="integration-copy-status">Ready to copy after setup.</p>
            </section>

            <div class="hidden-data">
              <span id="platform-summary"></span>
              <code id="embed-code"></code>
            </div>
          </form>
        </details>

      <div id="chat-window" class="chat-window" aria-live="polite">
        <div class="empty-state" data-empty-state>
          <span class="empty-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" role="img">
              <path d="M7 8h10M7 12h7M21 11.5a8.5 8.5 0 0 1-12.5 7.5L3 20.5l1.5-4.3A8.5 8.5 0 1 1 21 11.5Z" />
            </svg>
          </span>
        </div>
      </div>

      <form id="chat-form" class="chat-form">
        <label class="sr-only" for="chat-input">Message</label>
        <input id="chat-input" type="text" placeholder="Ask about the platform..." autocomplete="off" />
        <button type="submit" aria-label="Send message">
          <span>Send</span>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 12h14M13 6l6 6-6 6" />
          </svg>
        </button>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
