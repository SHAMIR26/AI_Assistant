<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Payment - LICONOR AI</title>
	<style>
		body{font-family:Inter,system-ui,Segoe UI,Arial;background:#0b1020;color:#e6eef8;min-height:100vh;display:flex;align-items:center;justify-content:center}
		.card{background:#0f1724;padding:28px;border-radius:12px;max-width:720px;width:96%;box-shadow:0 8px 30px rgba(0,0,0,0.6)}
		h1{margin:0 0 12px;font-size:1.6rem}
		p{color:#9fb1d0}
		.row{display:flex;gap:12px;margin-top:12px}
		input[type=text],input[type=email],input[type=number],input[type=url]{width:100%;padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);color:inherit}
		button{padding:12px 16px;border-radius:8px;border:none;cursor:pointer;background:#2563eb;color:#fff;font-weight:600}
		button:disabled{opacity:.65;cursor:not-allowed}
		.muted{color:#94a3b8;font-size:0.95rem;margin-top:8px}
		label{display:block;margin-top:12px;font-size:0.95rem}
		.small{font-size:0.9rem;color:#9fb1d0}
		.invoice-section{margin-top:24px;max-width:720px;width:96%;}
		.invoice-card{background:#111827;border:1px solid rgba(148,163,184,.2);border-radius:18px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2)}
		.invoice-header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 22px;background:#0f1724;border-bottom:1px solid rgba(148,163,184,.12)}
		.invoice-header strong{font-size:1rem;color:#fff}
		.invoice-header a{color:#60a5fa;text-decoration:none;font-size:.95rem}
		.invoice-actions{padding:16px 22px;display:flex;justify-content:flex-end}
		.invoice-actions button{padding:12px 16px;border-radius:999px;border:none;background:#2563eb;color:#fff;font-weight:700;cursor:pointer}
		.invoice-preview{width:100%;min-height:560px;border:none;display:block}
		.hidden{display:none}
	</style>
</head>
<body>
	<div class="card">
		<h1>Secure Payment</h1>
		<form id="payForm">
			<label>Amount (USD)</label>
			<input type="number" id="amount" name="amount" min="1" step="0.01" placeholder="55.00" required />

			<label>Full name</label>
			<input type="text" id="name" name="name" placeholder="Jane Doe" required />

			<label>Email</label>
			<input type="email" id="email" name="email" placeholder="jane@example.com" required />

			<div class="row" style="margin-top:16px">
				<button type="submit" id="payBtn">Pay with Paddle</button>
			</div>
		</form>
	</div>

	<div id="invoice-section" class="invoice-section hidden"></div>

	<!-- Paddle.js — loaded from Paddle's CDN. Switch to sandbox by changing data-environment -->
	<script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
	<script>
		// Initialize Paddle with your client-side token.
		// In sandbox mode set data-environment="sandbox" on the script tag above,
		// or call Paddle.Environment.set('sandbox') here before Paddle.Setup().
		if (window.Paddle) {
			var paddleClientToken = document.currentScript
				? document.currentScript.getAttribute('data-paddle-client-token') || ''
				: '';
			// Paddle.Setup is called once; the token is your client-side token (starts with "live_" or "test_")
			// It is safe to embed in HTML — it is NOT your secret API key.
			// Set PADDLE_CLIENT_TOKEN in your environment and inject it server-side, or hard-code it here.
			// Example: Paddle.Setup({ token: 'live_XXXXXXXXXXXXXXX' });
		}
	</script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
	<script>
		// Read amount and plan from URL and lock the amount input when provided
		(function () {
			var params = new URLSearchParams(window.location.search);
			var amt = params.get('amount');
			var plan = params.get('plan');
			var amountInput = document.getElementById('amount');
			if (amt && amountInput) {
				var num = parseFloat(amt);
				if (!isNaN(num)) {
					amountInput.value = num.toFixed(2);
					amountInput.setAttribute('readonly', 'readonly');
					amountInput.style.background = 'rgba(255,255,255,0.02)';
				}
			}
			if (plan) {
				var title = document.querySelector('.card h1');
				if (title) title.textContent = 'Secure Payment — ' + plan;
			}
		})();

		document.getElementById('payForm').addEventListener('submit', async function (e) {
			e.preventDefault();
			var btn = document.getElementById('payBtn');
			btn.disabled = true; btn.textContent = 'Creating payment...';

			var nameVal = document.getElementById('name').value.trim();
			var emailVal = document.getElementById('email').value.trim();
			var amountVal = parseFloat(document.getElementById('amount').value).toFixed(2);

			// Check local storage to decide returnUrl before contacting the server
			var storedBefore = JSON.parse(window.localStorage.getItem('liconr_payments') || '[]');
			var existsBefore = storedBefore.some(function (it) {
				return (it.email || '').toLowerCase() === (emailVal || '').toLowerCase();
			});

			var urlParams = new URLSearchParams(window.location.search);
			var plan = urlParams.get('plan');
			var baseUrl = existsBefore ? (window.location.origin + '/home.html') : (window.location.origin + '/accounts.html');
			var returnUrl = new URL(baseUrl);
			if (plan) {
				returnUrl.searchParams.set('plan', plan);
			}
			returnUrl = returnUrl.href;

			var payload = {
				amount: amountVal,
				name: nameVal,
				email: emailVal,
				currency: 'USD',
				plan: plan || '',
				returnUrl
			};

			try {
				var res = await fetch('/create-paddle-payment', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify(payload)
				});
				if (!res.ok) throw new Error('Server error');
				var data = await res.json();

				var params = new URLSearchParams(window.location.search);
				var paymentInfo = {
					name: nameVal,
					email: emailVal,
					amount: amountVal,
					plan: params.get('plan') || '',
					date: new Date().toISOString()
				};

				// Save or update the local record
				savePaymentRecord(paymentInfo, /*updateIfExists*/ true);

				var checkoutUrl = (data && data.url) ? data.url : returnUrl;
				var invoiceBlob = createInvoicePdf(paymentInfo);
				renderInvoiceSection(invoiceBlob, paymentInfo, checkoutUrl);

				btn.textContent = 'Invoice ready';
				btn.disabled = true;
			} catch (err) {
				alert('Payment creation failed: ' + err.message);
				btn.disabled = false; btn.textContent = 'Pay with Paddle';
			}
		});

		function formatInvoiceDate(iso) {
			var date = new Date(iso);
			return date.toLocaleDateString(undefined, {
				year: 'numeric',
				month: 'long',
				day: 'numeric'
			});
		}

		function createInvoicePdf(payment) {
			var doc = new window.jspdf.jsPDF({ unit: 'pt', format: 'letter' });
			doc.setFontSize(20);
			doc.text('LICONR AI Invoice', 40, 50);
			doc.setFontSize(10);
			doc.text('Invoice ID: ' + payment.id, 40, 76);
			doc.text('Date: ' + formatInvoiceDate(payment.date), 40, 92);
			doc.text('Bill to:', 40, 130);
			doc.setFontSize(12);
			doc.text(payment.name, 40, 148);
			doc.text(payment.email, 40, 164);
			doc.setFontSize(14);
			doc.text('Subscription details', 40, 206);
			doc.setFontSize(10);
			doc.text('Plan: ' + (payment.plan || 'Standard'), 40, 226);
			doc.text('Amount: $' + payment.amount + ' ' + (payment.currency || 'USD'), 40, 242);
			var lineY = 260;
			doc.line(40, lineY, 552, lineY);
			doc.setFontSize(12);
			doc.text('Total Due', 40, lineY + 30);
			doc.setFontSize(16);
			doc.setTextColor('#2563eb');
			doc.text('$' + payment.amount + ' ' + (payment.currency || 'USD'), 40, lineY + 54);
			doc.setTextColor('#000');
			doc.setFontSize(10);
			doc.text('Thank you for your subscription to LICONR AI. This invoice was generated automatically for your payment request.', 40, lineY + 90, { maxWidth: 500 });
			return doc.output('blob');
		}

		function renderInvoiceSection(blob, payment, checkoutUrl) {
			var invoiceSection = document.getElementById('invoice-section');
			var url = URL.createObjectURL(blob);
			invoiceSection.innerHTML = '';
			var card = document.createElement('div');
			card.className = 'invoice-card';

			var header = document.createElement('div');
			header.className = 'invoice-header';
			header.innerHTML = '<strong>Invoice Preview</strong>' +
				'<a id="download-invoice" href="' + url + '" download="invoice-' + encodeURIComponent(payment.id) + '.pdf">Download PDF</a>';
			card.appendChild(header);

			var embed = document.createElement('object');
			embed.className = 'invoice-preview';
			embed.data = url;
			embed.type = 'application/pdf';
			embed.innerHTML = '<p>Your browser does not support inline PDFs. <a href="' + url + '" download="invoice-' + encodeURIComponent(payment.id) + '.pdf">Download the invoice</a>.</p>';
			card.appendChild(embed);

			var actions = document.createElement('div');
			actions.className = 'invoice-actions';
			var continueButton = document.createElement('button');
			continueButton.type = 'button';
			continueButton.textContent = 'Continue to Paddle';
			continueButton.addEventListener('click', function () {
				window.location.href = checkoutUrl;
			});
			actions.appendChild(continueButton);
			card.appendChild(actions);

			invoiceSection.appendChild(card);
			invoiceSection.classList.remove('hidden');
		}

		var payDirectElement = document.getElementById('payDirect');
		if (payDirectElement) {
			payDirectElement.addEventListener('click', function () {
				var directInput = document.getElementById('directLink');
				var u = directInput ? directInput.value.trim() : '';
				if (!u) return alert('Paste a Payoneer link first');
				window.location.href = u;
			});
		}

		function savePaymentRecord(payment, updateIfExists) {
			var stored = JSON.parse(window.localStorage.getItem('liconr_payments') || '[]');
			var email = (payment.email || '').toLowerCase();
			if (updateIfExists) {
				var found = false;
				for (var i = 0; i < stored.length; i++) {
					if ((stored[i].email || '').toLowerCase() === email) {
						stored[i] = payment;
						found = true;
						break;
					}
				}
				if (!found) stored.push(payment);
			} else {
				stored.push(payment);
			}
			window.localStorage.setItem('liconr_payments', JSON.stringify(stored));
		}
	</script>
</body>
</html>
