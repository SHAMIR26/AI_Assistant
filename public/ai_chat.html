<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLUENINE AI Chat Assistant</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ai_chat.html only — full-screen focused chat, no setup panel */
    .chat-panel.fullscreen-chat {
      grid-template-rows: auto 1fr auto;
      min-height: min(820px, calc(100vh - 64px));
    }

    .chat-header-meta {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .chat-header-meta h1 {
      font-size: clamp(1.4rem, 3vw, 2.2rem);
    }

    .chat-header-platform {
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 700;
      margin: 0;
    }

    .chat-header-platform span {
      color: var(--accent);
    }

    /* Error / loading screens */
    .chat-status-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex: 1;
      padding: 40px 24px;
      text-align: center;
      color: var(--text-muted);
    }

    .chat-status-screen svg {
      width: 44px;
      height: 44px;
      fill: none;
      stroke: var(--accent);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.6;
    }

    .chat-status-screen p {
      margin: 0;
      max-width: 340px;
      font-size: 0.92rem;
      line-height: 1.55;
    }

    .chat-status-screen strong {
      display: block;
      margin-bottom: 6px;
      color: var(--text);
      font-size: 1.05rem;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--line);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <section class="chat-panel fullscreen-chat" aria-label="AI Chat Assistant">

      <header class="chat-header">
        <div class="chat-header-meta">
          <div class="logo-text">BLUENINE AI Chat Assistant</div>
          <p class="chat-header-platform" id="platform-label" hidden>
            Powered by <span id="platform-name-display"></span>
          </p>
        </div>
      </header>

      <!-- Loading screen (shown while verifying platform) -->
      <div id="chat-loading" class="chat-status-screen">
        <div class="spinner"></div>
        <p>Verifying platform…</p>
      </div>

      <!-- Error screen (shown when platform lookup fails) -->
      <div id="chat-error" class="chat-status-screen" hidden>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p><strong id="chat-error-title">Error</strong><span id="chat-error-msg"></span></p>
      </div>

      <!-- Chat window (hidden until platform verified) -->
      <div id="chat-window" class="chat-window" aria-live="polite" hidden>
        <div class="empty-state" data-empty-state>
          <span class="empty-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" role="img">
              <path d="M7 8h10M7 12h7M21 11.5a8.5 8.5 0 0 1-12.5 7.5L3 20.5l1.5-4.3A8.5 8.5 0 1 1 21 11.5Z" />
            </svg>
          </span>
        </div>
      </div>

      <!-- Input form (hidden until platform verified) -->
      <form id="chat-form" class="chat-form" hidden>
        <label class="sr-only" for="chat-input">Message</label>
        <input id="chat-input" type="text" placeholder="Ask anything..." autocomplete="off" />
        <button type="submit" aria-label="Send message">
          <span>Send</span>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 12h14M13 6l6 6-6 6" />
          </svg>
        </button>
      </form>

    </section>
  </main>

  <script>
    // ── Grab clientId from query string ──────────────────────────────────────
    const urlParams = new URLSearchParams(window.location.search);
    const clientId = urlParams.get('clientId') || '';
    const embedToken = urlParams.get('embedToken') || '';
    const siteUrl = urlParams.get('siteUrl') || '';
    const initialAssistantName = urlParams.get('assistantName') || '';
    const initialAssistantImage = urlParams.get('assistantImage') || '';

    // ── DOM refs ──────────────────────────────────────────────────────────────
    const chatWindow   = document.getElementById('chat-window');
    const chatForm     = document.getElementById('chat-form');
    const chatInput    = document.getElementById('chat-input');
    const chatLoading  = document.getElementById('chat-loading');
    const chatError    = document.getElementById('chat-error');
    const platformLabel       = document.getElementById('platform-label');
    const platformNameDisplay = document.getElementById('platform-name-display');
    const emptyState   = document.querySelector('[data-empty-state]');

    function applyAppearance(assistantName, assistantImage, instituteName = '') {
      const displayName = assistantName || instituteName || 'BLUENINE';

      if (instituteName) {
        platformNameDisplay.textContent = instituteName;
        platformLabel.hidden = false;
      }

      const headerTitle = document.querySelector('.logo-text');
      if (headerTitle) headerTitle.textContent = `${displayName} - AI Assistant`;
      document.title = instituteName ? `${displayName} - ${instituteName}` : `${displayName} - AI Assistant`;

      if (assistantImage) {
        const existing = document.querySelector('.assistant-avatar');
        if (existing) {
          existing.src = assistantImage;
          existing.alt = displayName;
          return;
        }

        const img = document.createElement('img');
        img.src = assistantImage;
        img.alt = displayName;
        img.style.width = '36px';
        img.style.height = '36px';
        img.style.borderRadius = '999px';
        img.style.objectFit = 'cover';
        img.style.marginRight = '10px';
        img.className = 'assistant-avatar';
        const meta = document.querySelector('.chat-header-meta');
        if (meta) meta.insertBefore(img, meta.firstChild);
      }
    }

    if (initialAssistantName || initialAssistantImage) {
      applyAppearance(initialAssistantName, initialAssistantImage);
    }

    // Listen for appearance updates sent from the parent embed script.
    // This ensures the launcher and iframe use the same assistant image/name.
    window.addEventListener('message', (event) => {
      try {
        const data = event.data || {};
        if (data?.type !== 'platformAppearance') return;
        const assistantName = data.assistantName || data.instituteName || 'BLUENINE';
        const assistantImage = data.assistantImage || null;
        const instituteName = data.instituteName || '';

        // Update header text and platform label
        try {
          if (instituteName) {
            platformNameDisplay.textContent = instituteName;
            platformLabel.hidden = false;
          }
          const headerTitle = document.querySelector('.logo-text');
          if (headerTitle) headerTitle.textContent = `${assistantName} — AI Assistant`;

          if (assistantImage) {
            const header = document.querySelector('.chat-header');
            // Replace existing avatar if present
            const existing = document.querySelector('.assistant-avatar');
            if (existing && existing.src !== assistantImage) {
              existing.src = assistantImage;
            } else if (!existing) {
              const img = document.createElement('img');
              img.src = assistantImage;
              img.alt = assistantName;
              img.style.width = '36px';
              img.style.height = '36px';
              img.style.borderRadius = '999px';
              img.style.objectFit = 'cover';
              img.style.marginRight = '10px';
              img.className = 'assistant-avatar';
              const meta = document.querySelector('.chat-header-meta');
              if (meta) meta.insertBefore(img, meta.firstChild);
            }
            document.title = `${assistantName} — ${instituteName || ''}`.trim();
          }
        } catch (err) {
          // ignore DOM update errors
        }
      } catch (err) {
        // ignore malformed messages
      }
    });

    // ── Helpers ───────────────────────────────────────────────────────────────
    function showError(title, msg) {
      const chatLoading = document.getElementById('chat-loading');
      const chatError = document.getElementById('chat-error');
      if (chatLoading) chatLoading.hidden = true;
      if (chatError) {
        const titleEl = document.getElementById('chat-error-title');
        const msgEl = document.getElementById('chat-error-msg');
        if (titleEl) titleEl.textContent = title;
        if (msgEl) msgEl.textContent = msg;
        chatError.hidden = false;
      }
    }

    function formatSourceList(sources = []) {
      if (!sources.length) return '';
      const unique = [...new Set(sources.map(s => s.source))];
      return `\n\nSources: ${unique.join(', ')}`;
    }

    function addMessage(role, text, sources = []) {
      emptyState?.classList.add('is-hidden');

      const bubble = document.createElement('div');
      bubble.className = `message ${role}`;

      const label = document.createElement('strong');
      label.textContent = role === 'user' ? 'You' : 'Assistant';

      const content = document.createElement('span');
      content.textContent = text;

      bubble.append(label, content);

      if (sources.length) {
        const sourceList = document.createElement('small');
        sourceList.className = 'message-sources';
        sourceList.textContent = formatSourceList(sources).trim();
        bubble.appendChild(sourceList);
      }

      chatWindow.appendChild(bubble);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function setLoading(isLoading) {
      chatInput.disabled = isLoading;
      chatForm.querySelector('button').disabled = isLoading;
    }

    function performAssistantAction(action) {
      if (!action || action.type !== 'redirect' || !action.url) return;

      window.setTimeout(() => {
        try {
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({
              type: 'platformAssistantAction',
              action
            }, '*');
            return;
          }

          window.location.assign(action.url);
        } catch (err) {
          addMessage('bot', `Please open this page: ${action.url}`);
        }
      }, 650);
    }

    // ── Verify platform and initialise chat ───────────────────────────────────
    async function init() {
      if (!clientId) {
        showError('No platform ID', 'This chat link is missing a platform ID. Please use the link provided by your platform.');
        return;
      }

      try {
        const statusParams = new URLSearchParams({ clientId });
        if (embedToken) statusParams.set('embedToken', embedToken);
        if (siteUrl) statusParams.set('siteUrl', siteUrl);

        const res = await fetch(`/api/platform/status?${statusParams.toString()}`);
        const data = await res.json();

        if (!res.ok || !data.configured) {
          showError('Platform not found', data.error || 'This platform ID is not recognised or has been removed.');
          return;
        }

        // Platform verified — show chat UI
        if (chatLoading) chatLoading.hidden = true;
        chatWindow.hidden = false;
        chatForm.hidden = false;

        const platform = data.platform || {};
        const name = platform.instituteName;
        const assistantName = platform.assistantName || 'BLUENINE';
        const assistantImage = platform.assistantImage || null;
        if (name) {
          platformNameDisplay.textContent = name;
          platformLabel.hidden = false;
          document.title = `${assistantName} — ${name}`;
        }

        // Update header title to show assistant name and optional avatar
        try {
          const headerTitle = document.querySelector('.logo-text');
          if (headerTitle) headerTitle.textContent = `${assistantName} — AI Assistant`;
          if (assistantImage) {
            const header = document.querySelector('.chat-header');
            const img = document.createElement('img');
            img.src = assistantImage;
            img.alt = assistantName;
            img.style.width = '36px';
            img.style.height = '36px';
            img.style.borderRadius = '999px';
            img.style.objectFit = 'cover';
            img.style.marginRight = '10px';
            const meta = document.querySelector('.chat-header-meta');
            if (meta && !meta.querySelector('.assistant-avatar')) {
              img.className = 'assistant-avatar';
              meta.insertBefore(img, meta.firstChild);
            }
          }
        } catch (err) {
          // ignore header updates if DOM structure differs
        }

        // Intro message so visitors notice the assistant immediately
        try {
          const intro = `I am ${assistantName} assistant, and I am here to assist and guide you in the ${name || 'platform'}.`;
          addMessage('bot', intro);
        } catch (err) {
          // ignore if addMessage fails
        }

      } catch (err) {
        showError('Connection error', 'Could not reach the server. Please check your connection and try again.');
      }
    }

    // ── Chat form submit ──────────────────────────────────────────────────────
    chatForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const message = chatInput.value.trim();
      if (!message) return;

      addMessage('user', message);
      chatInput.value = '';
      setLoading(true);

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, clientId, embedToken, siteUrl })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Server error');

        addMessage('bot', data.reply || 'No reply from server.', data.sources);
        performAssistantAction(data.action);
      } catch (err) {
        addMessage('bot', err.message || 'There was an error sending your message.');
      } finally {
        setLoading(false);
      }
    });

    init();
  </script>
</body>
</html>
